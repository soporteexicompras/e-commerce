# ════════════════════════════════════════════════════════════════════════════
#  Exicompras — Docker Compose (producción)
#
#  Servicios:
#    app         → PHP-FPM (la aplicación)
#    nginx       → Reverse proxy / servidor web (punto de entrada HTTP)
#    queue       → Worker de colas (php artisan queue:work)
#    scheduler   → Cron interno de Laravel (schedule:run cada 60s)
#    db          → MySQL 8.0 (opcional, puedes usar uno externo)
#    redis       → Cache + sesiones + colas (opcional)
#
#  ── Uso local ─────────────────────────────────────────────────────
#    cp .env.docker.example .env
#    docker network create coolify     # solo si vas a usar el stack completo con Traefik
#    docker compose up -d
#    docker compose exec app php artisan aimeos:setup
#
#  ── Coolify v4.x (build pack: Docker Compose) ────────────────────
#    Coolify provisiona la red `coolify` automáticamente, inyecta
#    sus propias Traefik labels (router por dominio configurado en
#    el dashboard) y lee el .env desde el panel Environment Variables.
#
#    Settings de Coolify para este repo:
#      • Build Pack        : Docker Compose
#      • Docker Compose    : /docker-compose.yml
#      • Port Exposes      : 80   (nginx)
#      • Base Directory    : /   (raíz del repo)
#      • Domains           : 1 dominio (ej. shop.exicompras.com)
#      • Environment Vars  : inyectar las claves de .env.docker.example
#                            + APP_KEY (auto-generable en primer arranque)
#      • Docker Network    : crear la red `coolify` (Coolify ya la gestiona)
#
#    Traefik labels de este compose son genéricas (sin dominio
#    hardcodeado) para que Coolify pueda sobrescribir el router con
#    el dominio configurado en su dashboard. Solo se mantienen las
#    labels de infraestructura (enable, network).
# ════════════════════════════════════════════════════════════════════════════

services:

  # ──────────────────────────────────────────────────────────────────
  #  app — PHP-FPM
  # ──────────────────────────────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: app                # usa el stage de producción
    image: exicompras/app:latest
    container_name: exicompras-app
    restart: unless-stopped
    working_dir: /var/www/html
    env_file: [.env]
    environment:
      # Forzar variables que el container necesita
      - APP_ENV=production
      - RUN_MIGRATIONS=${RUN_MIGRATIONS:-false}
      - RUN_SEEDERS=${RUN_SEEDERS:-true}
    volumes:
      # Solo storage/app se monta (uploads del usuario). El resto de
      # storage/ se conserva desde la imagen y el entrypoint crea los
      # subdirs faltantes (cache/sessions/views) en cada arranque.
      - app-storage:/var/www/html/storage/app
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks: [exicompras]
    healthcheck:
      # Comprueba que PHP-FPM escucha en :9000 (sin HTTP porque es FastCGI).
      # Si el puerto responde, el worker está listo para aceptar requests
      # de nginx. /up lo chequea nginx (siguiente servicio).
      #
      # NOTA: se envuelve en `bash -c` porque /dev/tcp/host/puerto es un
      # builtin exclusivo de bash. La imagen base usa Debian 12 con
      # /bin/sh -> dash, y Docker ejecuta el healthcheck con `/bin/sh -c`,
      # lo que hacía que fallara siempre y el contenedor quedara
      # "unhealthy" pese a que php-fpm sí estaba escuchando.
      test: ["CMD-SHELL", "bash -c '(echo > /dev/tcp/127.0.0.1/9000) >/dev/null 2>&1 || exit 1'"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 256M

  # ──────────────────────────────────────────────────────────────────
  #  nginx — Web server (único puerto expuesto: 80)
  # ──────────────────────────────────────────────────────────────────
  nginx:
    build:
      context: .
      dockerfile: docker/nginx/Dockerfile
    image: exicompras/nginx:latest
    container_name: exicompras-nginx
    restart: unless-stopped
    depends_on:
      app:
        condition: service_healthy
    networks:
      - exicompras
      - coolify
    labels:
      # Infra Traefik — no incluyen router/rule para que Coolify lo
      # inyecte desde su dashboard. Si necesitas un router manual,
      # duplica la lógica en Coolify (Domains) y elimina el hardcode.
      - "traefik.enable=true"
      - "traefik.docker.network=coolify"
      - "coolify.managed=true"
      - "coolify.pullRequestId=0"
      - "coolify.type=application"
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost/up"]
      interval: 30s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 256M

  # ──────────────────────────────────────────────────────────────────
  #  queue — Worker de colas
  # ──────────────────────────────────────────────────────────────────
  queue:
    image: exicompras/app:latest           # reusa la imagen de app
    container_name: exicompras-queue
    restart: unless-stopped
    working_dir: /var/www/html
    env_file: [.env]
    environment:
      - APP_ENV=production
    volumes:
      - app-storage:/var/www/html/storage/app
    entrypoint: ["/var/www/html/docker/queue-entrypoint.sh"]
    # `command: ~` (YAML null) requerido por el validador de Coolify
    # que rechaza `command: []`. El entrypoint hace exec al worker.
    command: ~
    depends_on:
      app:
        condition: service_healthy
    networks: [exicompras]
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 128M
    # Permite escalar horizontalmente
    #   docker compose up -d --scale queue=3

  # ──────────────────────────────────────────────────────────────────
  #  scheduler — Cron de Laravel (schedule:run cada 60s)
  # ──────────────────────────────────────────────────────────────────
  scheduler:
    image: exicompras/app:latest
    container_name: exicompras-scheduler
    restart: unless-stopped
    working_dir: /var/www/html
    env_file: [.env]
    environment:
      - APP_ENV=production
    volumes:
      - app-storage:/var/www/html/storage/app
    command: >
      sh -c "while true; do
                php artisan schedule:run --no-interaction;
                sleep 60;
              done"
    depends_on:
      app:
        condition: service_healthy
    networks: [exicompras]
    deploy:
      resources:
        limits:
          memory: 256M

  # ──────────────────────────────────────────────────────────────────
  #  db — MySQL 8.0 (opcional — comentar si usas DB gestionada)
  # ──────────────────────────────────────────────────────────────────
  db:
    image: mysql:8.0
    container_name: exicompras-db
    restart: unless-stopped
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --default-authentication-plugin=mysql_native_password
      - --innodb-buffer-pool-size=512M
      - --max-connections=200
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-rootpass}
      MYSQL_DATABASE:      ${DB_DATABASE:-exicompras}
      MYSQL_USER:          ${DB_USERNAME:-exicompras}
      MYSQL_PASSWORD:      ${DB_PASSWORD:-secret}
    volumes:
      - dbdata:/var/lib/mysql
      - ./docker/mysql/init:/docker-entrypoint-initdb.d:ro
    networks: [exicompras]
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-p${DB_ROOT_PASSWORD:-rootpass}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 1G

  # ──────────────────────────────────────────────────────────────────
  #  redis — Cache + sesiones + colas (opcional)
  # ──────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: exicompras-redis
    restart: unless-stopped
    command: >
      redis-server
        --appendonly yes
        --maxmemory 256mb
        --maxmemory-policy allkeys-lru
    volumes:
      - redisdata:/data
    networks: [exicompras]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

# ──────────────────────────────────────────────────────────────────
#  Volúmenes persistentes
# ──────────────────────────────────────────────────────────────────
volumes:
  app-storage:
  dbdata:
  redisdata:

# ──────────────────────────────────────────────────────────────────
#  Redes
# ──────────────────────────────────────────────────────────────────
networks:
  exicompras:
    driver: bridge
  # La red `coolify` la crea Coolify automáticamente en su host.
  # En local (`docker compose up`), créala manualmente:
  #   docker network create coolify
  # Si no existe y nginx la referencia, el servicio no arrancará.
  coolify:
    external: true
    name: coolify

