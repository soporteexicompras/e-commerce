; ════════════════════════════════════════════════════════════════════════════
;  Exicompras — PHP-FPM pool www
; ════════════════════════════════════════════════════════════════════════════
[www]
user  = www-data
group = www-data

listen       = [::]:9000
listen.owner = www-data
listen.group = www-data
listen.mode  = 0660

; ── Process manager dinámico (escala según carga) ─────────────────────
pm                        = dynamic
pm.max_children           = 20         ; máximo de workers
pm.start_servers          = 4          ; arrancan al inicio
pm.min_spare_servers      = 2          ; mínimo de ociosos
pm.max_spare_servers      = 6          ; máximo de ociosos
pm.max_requests           = 1000       ; reciclar tras N requests (evita leaks)
pm.process_idle_timeout   = 60s

; ── Logging ────────────────────────────────────────────────────────────
catch_workers_output      = yes
decorate_workers_output   = no

; ── Variables de entorno (necesario para que $_SERVER/ENV funcionen) ───
clear_env = no

; ── Timeouts (Aimeos puede ser lento en operaciones pesadas) ──────────
request_terminate_timeout = 300s
