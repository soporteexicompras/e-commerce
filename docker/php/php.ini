; ════════════════════════════════════════════════════════════════════════════
;  Exicompras — php.ini para producción
;  Se carga desde /usr/local/etc/php/conf.d/zz-exicompras.ini (zz- se carga
;  al final, sobrescribiendo defaults).
; ════════════════════════════════════════════════════════════════════════════

; ── Memoria y ejecución ──────────────────────────────────────────────────
memory_limit                = 512M
max_execution_time          = 300
max_input_time              = 300

; ── Subida de archivos (Aimeos importa imágenes grandes) ─────────────────
upload_max_filesize         = 50M
post_max_size               = 50M
max_file_uploads            = 20

; ── Errores y logs ───────────────────────────────────────────────────────
display_errors              = Off
display_startup_errors      = Off
log_errors                  = On
log_errors_max_len          = 8192
error_reporting             = E_ALL & ~E_DEPRECATED & ~E_STRICT
error_log                   = /proc/self/fd/2

; ── Seguridad ────────────────────────────────────────────────────────────
expose_php                  = Off
allow_url_fopen             = On
allow_url_include           = Off

; ── Zona horaria y locale ────────────────────────────────────────────────
date.timezone               = America/Bogota

; ── Sesiones ─────────────────────────────────────────────────────────────
session.cookie_httponly     = 1
session.cookie_samesite     = "Lax"
session.use_strict_mode     = 1
session.use_cookies         = 1
session.use_only_cookies    = 1
session.gc_maxlifetime      = 7200

; ── Realpath cache (mejora rendimiento) ──────────────────────────────────
realpath_cache_size         = 4096K
realpath_cache_ttl          = 600

; ── Output buffering ─────────────────────────────────────────────────────
output_buffering            = 4096
implicit_flush              = Off
