; ─── Memory & timeouts ────────────────────────────────────────────────────────
memory_limit          = 256M
max_execution_time    = 300
max_input_time        = 300
max_input_vars        = 3000

; ─── File uploads ─────────────────────────────────────────────────────────────
upload_max_filesize   = 32M
post_max_size         = 32M

; ─── Charset ──────────────────────────────────────────────────────────────────
default_charset       = UTF-8

; ─── Errors (disable display; let Laravel handle them) ────────────────────────
display_errors        = Off
display_startup_errors = Off
log_errors            = On

; ─── Timezone (override per container with TZ env var if needed) ──────────────
date.timezone         = UTC

; ─── OPcache ──────────────────────────────────────────────────────────────────
opcache.enable                 = 1
opcache.memory_consumption     = 256
opcache.interned_strings_buffer = 16
opcache.max_accelerated_files  = 20000
; validate_timestamps=1 reloads modified files — keep On for development.
; Set to 0 in production (target: production) for maximum performance.
opcache.validate_timestamps    = 1
opcache.revalidate_freq        = 0
opcache.save_comments          = 1
opcache.fast_shutdown          = 1
