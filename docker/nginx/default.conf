# ════════════════════════════════════════════════════════════════════════════
#  Exicompras — VirtualHost del frontend
# ════════════════════════════════════════════════════════════════════════════
server {
    listen      80 default_server;
    listen      [::]:80 default_server;
    server_name _;

    root  /var/www/html/public;
    index index.php;

    charset utf-8;

    # ── Security headers ─────────────────────────────────────────────
    add_header X-Frame-Options          "SAMEORIGIN"            always;
    add_header X-Content-Type-Options   "nosniff"                always;
    add_header X-XSS-Protection         "1; mode=block"          always;
    add_header Referrer-Policy          "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy       "geolocation=(), microphone=(), camera=()" always;
    # add_header Content-Security-Policy "default-src 'self';"   always;  # ajustar según Aimeos

    # ── Laravel: enviar todo a index.php ─────────────────────────────
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # ── Aimeos: archivos servidos desde /packages/ y /vendor/shop/ ───
    location /packages/      { try_files $uri $uri/ /index.php?$query_string; }
    location /vendor/shop/   { try_files $uri $uri/ /index.php?$query_string; }
    location /admin/         { try_files $uri $uri/ /index.php?$query_string; }

    # ── PHP-FPM ──────────────────────────────────────────────────────
    location ~ \.php$ {
        # Importante: NO usamos try_files $uri =404 aca — el container nginx es alpine sin
        # los archivos PHP (viven en el container `app`). Si lo dejamos, nginx chequea si
        # el archivo existe localmente, no lo encuentra y devuelve 404 antes de pasar a fastcgi.
        fastcgi_split_path_info  ^(.+\.php)(/.+)$;
        fastcgi_pass             app:9000;
        fastcgi_index            index.php;
        # Importante: usamos $document_root (literal /var/www/html/public) en vez de $realpath_root,
        # porque $realpath_root resuelve a cadena vacia cuando el path no existe localmente en el
        # container nginx (que es alpine sin los archivos PHP). Si quedara vacio, PHP-FPM recibiria
        # SCRIPT_FILENAME=/index.php y devolveria "File not found."
        fastcgi_param            SCRIPT_FILENAME  $document_root$fastcgi_script_name;
        fastcgi_param            DOCUMENT_ROOT    $document_root;
        include                   fastcgi_params;
        fastcgi_read_timeout     300;
        fastcgi_buffers           16 16k;
        fastcgi_buffer_size       32k;
    }

    # ── Assets estáticos con cache agresivo ──────────────────────────
    location ~* \.(?:css|js|map|json|woff2?|ttf|otf|eot|ico|png|jpe?g|gif|svg|webp|avif)$ {
        expires     1y;
        add_header  Cache-Control "public, immutable";
        access_log  off;
        try_files   $uri =404;
    }

    # ── Vite HMR (solo en dev) ───────────────────────────────────────
    location /@vite/  { proxy_pass http://app:9000; }
    location ~* /@id/  { proxy_pass http://app:9000; }
    location ~* /@fs/  { proxy_pass http://app:9000; deny all; }

    # ── Bloquear archivos sensibles ──────────────────────────────────
    location ~ /\.(?!well-known).*                 { deny all; }
    location ~ /(storage|bootstrap|config|database|resources|tests)/ {
        deny all;
        return 403;
    }
    location ~ \.(env|sqlite|sqlite3|sql|git|htaccess|htpasswd|ini|log|sh|md|json|yaml|yml|toml|lock|bak|swp)$ {
        deny all;
        return 403;
    }

    # ── Páginas de error personalizadas ──────────────────────────────
    error_page 404 /index.php;
    error_page 500 502 503 504 /index.php;
}
